

models:
  - name: dim_listings_cleansed
    data_tests:
      - minimum_row_count:
          arguments:
            row_count: 1000
        

    columns: 
      - name: listing_id
        data_tests:
          - unique
          - not_null


      - name: host_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id
        

      - name: room_type
        data_tests:
          - accepted_values:
              values: ['Entire home/apt','Shared room','Private room','Hotel room']
      
      - name: minimum_nights
        data_tests:
          - positive_values


  - name: dim_hosts_cleansed
    # config:
      # contract:
      #   enforced: true
    
    constraints:
      - type: primary_key
        columns: [host_id]

    columns:
      - name: host_id
        # data_type: integer
        data_tests:
          - unique
          - not_null

      - name: host_name
        # data_type: string
        data_tests:
          - not_null

      - name: is_superhost
        # data_type: string
        data_tests:
          - accepted_values:
              values: ['t','f']
      
      # - name: created_at
      #   data_type: timestamp

      # - name: updated_at
      #   data_type: timestamp


  - name: fct_reviews
    columns:
      - name: listing_id
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_listings_cleansed')
              field: listing_id
      
      - name: review_sentiment
        data_tests:
          - accepted_values:
              values: ['negative', 'neutral', 'positive']

      - name: reviewer_name
        data_tests:
          - not_null